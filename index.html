<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Who Is AI? - Legal Information</title>
    <style>
      :root {
        --bg: #f7f7f9;
        --card: #ffffff;
        --text: #1d1d1f;
        --muted: #5f6368;
        --line: #e3e5e8;
        --accent: #0b57d0;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial,
          sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .wrap {
        max-width: 760px;
        margin: 36px auto;
        padding: 0 16px 24px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 20px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0 0 14px;
        line-height: 1.55;
      }
      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      li + li {
        margin-top: 10px;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .muted {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card">
        <h1>Who Is AI? - Legal Information</h1>
        <p class="muted">
          Legal pages for the mobile game "Who Is AI?".
        </p>
        <ul>
          <li>
            <a href="./privacy-policy/">Privacy Policy / Политика конфиденциальности</a>
          </li>
          <li>
            <a href="./terms-of-use/">Terms of Use / Пользовательское соглашение</a>
          </li>
        </ul>
      </section>
    </main>
  </body>
</html>
